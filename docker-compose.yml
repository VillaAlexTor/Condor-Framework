version: "3.9"

services:

  # ─────────────────────────────────────────────
  #  condor-dashboard (React + Vite)
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ./condor-dashboard
      dockerfile: Dockerfile
    container_name: condor-dashboard
    ports:
      - "5173:5173"
    volumes:
      - ./condor-dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - condor-net

  # ─────────────────────────────────────────────
  #  condor-report — Backend (Express + Puppeteer)
  # ─────────────────────────────────────────────
  report-backend:
    build:
      context: ./condor-report/backend
      dockerfile: Dockerfile
    container_name: condor-report-backend
    ports:
      - "3001:3001"
    volumes:
      - ./condor-report/backend:/app
      - report_backend_node_modules:/app/node_modules
      - report_output:/app/output
    environment:
      - PORT=3001
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5174
      - OUTPUT_DIR=/app/output
      - PDF_TIMEOUT=30000
    restart: unless-stopped
    networks:
      - condor-net
    # Puppeteer necesita más memoria compartida para Chromium
    shm_size: "1gb"

  # ─────────────────────────────────────────────
  #  condor-report — Frontend (Vue + Vite)
  # ─────────────────────────────────────────────
  report-frontend:
    build:
      context: ./condor-report/frontend
      dockerfile: Dockerfile
    container_name: condor-report-frontend
    ports:
      - "5174:5174"
    volumes:
      - ./condor-report/frontend:/app
      - report_frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_BASE=http://localhost:3001
    depends_on:
      - report-backend
    restart: unless-stopped
    networks:
      - condor-net

# ─────────────────────────────────────────────
#  Volúmenes nombrados
# ─────────────────────────────────────────────
volumes:
  dashboard_node_modules:
  report_backend_node_modules:
  report_frontend_node_modules:
  report_output:

# ─────────────────────────────────────────────
#  Red compartida
# ─────────────────────────────────────────────
networks:
  condor-net:
    driver: bridge